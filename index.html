<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
    <meta charset="UTF-8">
    <title>AI Task Manager</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #e5ddd5; display: flex; justify-content: center; padding: 50px; }
        .chat-container { width: 400px; background: white; border-radius: 15px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); display: flex; flex-direction: column; height: 600px; overflow: hidden; }
        .header { background: #075e54; color: white; padding: 20px; text-align: center; font-size: 1.2em; font-weight: bold; }
        .chat-box { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; background-color: #e5ddd5; }
        .message { max-width: 80%; padding: 12px 16px; border-radius: 20px; font-size: 15px; line-height: 1.4; position: relative; }
        .user-message { background-color: #dcf8c6; align-self: flex-start; border-bottom-right-radius: 4px; }
        .bot-message { background-color: #ffffff; align-self: flex-end; border-bottom-left-radius: 4px; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
        .input-area { display: flex; padding: 15px; background: #f0f0f0; border-top: 1px solid #ddd; }
        .input-area input { flex: 1; padding: 12px 15px; border: none; border-radius: 25px; outline: none; font-size: 15px; }
        .input-area button { background: #128c7e; color: white; border: none; padding: 10px 20px; margin-right: 10px; border-radius: 25px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .input-area button:hover { background: #075e54; }
        .typing { color: #888; font-size: 12px; text-align: right; margin-top: -10px; display: none; }
    </style>
</head>
<body>

<div class="chat-container">
    <div class="header">🤖 הסוכן האישי שלך</div>
    <div class="chat-box" id="chatBox">
        <div class="message bot-message">היי! אני הסוכן החכם שלך. איזה משימות תרצי שאנהל עבורך היום?</div>
    </div>
    <div class="typing" id="typingIndicator">הסוכן מקליד...</div>
    <div class="input-area">
        <input type="text" id="userInput" placeholder="הקלידי משימה או בקשה..." onkeypress="handleKeyPress(event)">
        <button onclick="sendMessage()">שלח</button>
    </div>
</div>

<script>
    async function sendMessage() {
        const inputField = document.getElementById("userInput");
        const chatBox = document.getElementById("chatBox");
        const typingIndicator = document.getElementById("typingIndicator");
        const message = inputField.value.trim();

        if (message === "") return;

        // הוספת הודעת המשתמש למסך
        chatBox.innerHTML += `<div class="message user-message">${message}</div>`;
        inputField.value = "";
        chatBox.scrollTop = chatBox.scrollHeight;

        // הצגת סטטוס "מקליד..."
        typingIndicator.style.display = "block";

        try {
            // שליחה לשרת הפייתון שלך!
            const response = await fetch("http://127.0.0.1:8000/chat", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ message: message })
            });

            const data = await response.json();
            
            // הסתרת ההקלדה והצגת תשובת הבוט
            typingIndicator.style.display = "none";
            chatBox.innerHTML += `<div class="message bot-message">${data.reply}</div>`;
            chatBox.scrollTop = chatBox.scrollHeight;

        } catch (error) {
            typingIndicator.style.display = "none";
            chatBox.innerHTML += `<div class="message bot-message" style="color: red;">אופס! אין חיבור לשרת. ודאי שהפייתון רץ.</div>`;
        }
    }

    // מאפשר ללחוץ Enter כדי לשלוח
    function handleKeyPress(event) {
        if (event.key === "Enter") sendMessage();
    }
</script>

</body>
</html>
